{% extends 'base.html' %}
{% block title %} Delete District {% endblock %}
{% block content %}
{% load static %}

<!-- Page Header -->
<div class="page-header-breadcrumb d-md-flex d-block align-items-center justify-content-between ">
    <h4 class="fw-medium mb-0">Deleting District</h4>
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'district' %}" class="text-white-30">Dashboard</a></li>
        <li class="breadcrumb-item active" aria-current="page">District</li>
    </ol>
</div>
<div class="main-content app-content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-xl-6">
                <div class="card custom-card">
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <h6 class="mb-4">Are you sure you want to delete the district '{{ district.name }}'?</h6>
                            <div class="col-12 text-end">
                                <input type="submit" class="btn btn-danger me-2" value="Yes, delete">
                                <a href="{% url 'district' %}" class="btn btn-secondary">No, cancel</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
