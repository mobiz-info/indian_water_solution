{% extends 'base.html' %}
{% block title %} Edit District {% endblock %}
{% block block_title %} Edit District {% endblock %}
{% block content %}
{% load static %}

<!-- Page Header -->
<div class="page-header-breadcrumb d-md-flex d-block align-items-center justify-content-between ">
    <h4 class="fw-medium mb-0">Edit District</h4>
    <ol class="breadcrumb">
        <li class="breadcrumb-item"><a href="{% url 'district' %}" class="text-white-30">Dashboard</a></li>
        <li class="breadcrumb-item active" aria-current="page">District</li>
    </ol>
</div>
<div class="main-content app-content">
    <div class="container-fluid">

        <div class="row">
            <div class="col-xl-12">
                <div class="card custom-card">
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="name" class="form-label">District Name</label>
                                {{ form.name }}
                                <span style="color: red;">{{ form.name.errors }}</span>
                            </div>
                            <div class="col-12 text-end mt-5">
                                <input type="submit" class="btn btn-primary me-2 mb-2" value="Submit">
                                <button class="btn btn-success   me-md-2  mb-2" type="button" onClick="javascript:history.go(-1);">
                                    <i class="bi bi-backspace-fill pe-1"></i>Back</button>
                                <a class="btn btn-success me-md-2  mb-2"
                                href="{% url 'district' %}"> <i class="bi bi-backspace-fill pe-1"></i>Back to Dashboard </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>
{% endblock %}
